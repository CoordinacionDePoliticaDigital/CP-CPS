name: Ajustar retención de detalles

on:
  push:
    branches:
      - docs/alinear-neutralidad-cp-cps
    paths:
      - .github/scripts/ajustar_retencion_detalles.py
      - .github/workflows/ajustar-retencion-detalles.yml

permissions:
  contents: write

jobs:
  aplicar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/alinear-neutralidad-cp-cps
      - run: python .github/scripts/ajustar_retencion_detalles.py
      - name: Validar
        run: |
          grep -q 'se conservarán siempre en inventarios' CP-ACCHIH-001-v1.2-proyecto.md
          grep -q 'se conservarán siempre en inventarios' CPS-ACCHIH-001-v1.2-proyecto.md
          grep -q 'Su divulgación pública podrá limitarse' CP-ACCHIH-001-v1.2-proyecto.md
          grep -q 'Su divulgación pública podrá limitarse' CPS-ACCHIH-001-v1.2-proyecto.md
      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CP-ACCHIH-001-v1.2-proyecto.md CPS-ACCHIH-001-v1.2-proyecto.md
          git commit -m 'docs: exigir conservación interna de detalles tecnológicos'
          git push
