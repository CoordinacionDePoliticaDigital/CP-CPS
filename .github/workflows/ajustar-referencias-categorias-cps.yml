name: Ajustar referencias de categorías CPS

on:
  push:
    branches:
      - docs/alinear-neutralidad-cp-cps
    paths:
      - .github/scripts/ajustar_referencias_categorias_cps.py
      - .github/workflows/ajustar-referencias-categorias-cps.yml

permissions:
  contents: write

jobs:
  aplicar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/alinear-neutralidad-cp-cps

      - run: python .github/scripts/ajustar_referencias_categorias_cps.py

      - name: Validar
        run: |
          grep -q 'sección 3.1 para verificación automatizada de identidad' CPS-ACCHIH-001-v1.2-proyecto.md
          grep -q 'sección 9 para conservación de documentos y evidencias' CPS-ACCHIH-001-v1.2-proyecto.md

      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CPS-ACCHIH-001-v1.2-proyecto.md
          git commit -m 'docs: corregir referencias de categorías tecnológicas en la CPS'
          git push
