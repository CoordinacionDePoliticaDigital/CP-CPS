name: Alinear neutralidad CP y CPS

on:
  push:
    branches:
      - docs/alinear-neutralidad-cp-cps
    paths:
      - .github/scripts/alinear_neutralidad_cp_cps.py
      - .github/workflows/alinear-neutralidad-cp-cps.yml

permissions:
  contents: write

jobs:
  aplicar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/alinear-neutralidad-cp-cps

      - run: python .github/scripts/alinear_neutralidad_cp_cps.py

      - name: Validar
        run: |
          grep -q 'arquitectura funcional, las categorías de servicios tecnológicos' CP-ACCHIH-001-v1.2-proyecto.md
          grep -q 'Las secciones 5 a 8 de esta CPS documentan la arquitectura funcional' CPS-ACCHIH-001-v1.2-proyecto.md

      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CP-ACCHIH-001-v1.2-proyecto.md CPS-ACCHIH-001-v1.2-proyecto.md
          git commit -m 'docs: alinear neutralidad tecnológica entre CP y CPS'
          git push
