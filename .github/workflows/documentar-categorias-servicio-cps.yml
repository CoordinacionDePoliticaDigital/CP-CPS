name: Documentar categorías de servicio CPS

on:
  push:
    branches:
      - docs/alinear-neutralidad-cp-cps
    paths:
      - .github/scripts/documentar_categorias_servicio_cps.py
      - .github/workflows/documentar-categorias-servicio-cps.yml

permissions:
  contents: write

jobs:
  aplicar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/alinear-neutralidad-cp-cps

      - run: python .github/scripts/documentar_categorias_servicio_cps.py

      - name: Validar
        run: |
          grep -q 'infraestructura de cómputo y alojamiento' CPS-ACCHIH-001-v1.2-proyecto.md
          grep -q 'verificación automatizada de identidad' CPS-ACCHIH-001-v1.2-proyecto.md

      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CPS-ACCHIH-001-v1.2-proyecto.md
          git commit -m 'docs: documentar categorías de servicios tecnológicos en la CPS'
          git push
