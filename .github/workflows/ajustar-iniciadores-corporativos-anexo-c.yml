name: Ajustar iniciadores corporativos Anexo C

on:
  push:
    branches:
      - docs/anexo-c-causales-revocacion
    paths:
      - .github/scripts/ajustar_iniciadores_corporativos_anexo_c.py
      - .github/workflows/ajustar-iniciadores-corporativos-anexo-c.yml

permissions:
  contents: write

jobs:
  aplicar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/anexo-c-causales-revocacion

      - run: python .github/scripts/ajustar_iniciadores_corporativos_anexo_c.py

      - name: Validar
        run: |
          grep -q 'persona liquidadora' Productos/Anexo_C_Matriz_Causas_Revocacion.md
          grep -q 'cualquiera de las sociedades escindidas' Productos/Anexo_C_Matriz_Causas_Revocacion.md
          grep -q 'sociedad subsistente en caso de fusión' Productos/Anexo_C_Matriz_Causas_Revocacion.md

      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Productos/Anexo_C_Matriz_Causas_Revocacion.md
          git commit -m 'docs: incluir iniciadores corporativos en el Anexo C'
          git push
